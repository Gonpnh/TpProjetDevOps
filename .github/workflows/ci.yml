name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - uses: actions/checkout@v4

      # 2️⃣ Installer JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3️⃣ Build + tests Maven
      - name: Build and Test with Maven
        run: mvn -B clean verify

      # 4️⃣ Lister les fichiers XML générés (optionnel pour debug)
      - name: List Test Reports
        run: ls -R target/surefire-reports/*.xml || echo "No reports found"

      # 5️⃣ Publier les rapports JUnit et créer un check run
      - name: Publish Test Report
        if: success() || failure()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit
          path: 'target/surefire-reports/*.xml'
          reporter: java-junit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
