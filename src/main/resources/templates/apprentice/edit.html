<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier un apprenti - ASTA</title>
    <link rel="stylesheet" th:href="@{/css/edit-apprentice.css}">
</head>
<body>
    <div class="header">
        <h1>ASTA - Apprentis</h1>
        <div class="user-info">
            <a th:href="@{/dashboard}" class="back-btn">← Retour au tableau de bord</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h2>Modifier l'apprenti</h2>
        </div>

        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>

        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>

        <form class="form-card" method="post" th:action="@{/apprentis/{id}/edit(id=${apprenti.id})}" th:object="${apprenti}">
            <div class="section">
                <h3>Informations personnelles</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="nom">Nom <span class="required">*</span></label>
                        <input type="text" id="nom" name="nom" th:value="*{nom}" required>
                    </div>
                    <div class="form-group">
                        <label for="prenom">Prénom <span class="required">*</span></label>
                        <input type="text" id="prenom" name="prenom" th:value="*{prenom}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <input type="email" id="email" name="email" th:value="*{email}" required>
                    </div>
                    <div class="form-group">
                        <label for="telephone">Téléphone</label>
                        <input type="tel" id="telephone" name="telephone" th:value="*{telephone}" placeholder="0612345678">
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>Informations académiques</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="anneeAcademique">Année académique <span class="required">*</span></label>
                        <select id="anneeAcademique" name="anneeAcademique" required>
                            <option value="">-- Sélectionner une année académique --</option>
                            <option th:each="annee : ${annees}"
                                    th:value="${annee}"
                                    th:text="${annee}"
                                    th:selected="${annee == apprenti.anneeAcademique}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="niveau">Niveau</label>
                        <select id="niveau" name="niveau" required>
                            <option value="I1" th:selected="*{niveau == 'I1'}">I1</option>
                            <option value="I2" th:selected="*{niveau == 'I2'}">I2</option>
                            <option value="I3" th:selected="*{niveau == 'I3'}">I3</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="programme">Programme</label>
                        <input type="text" id="programme" name="programme" th:value="*{programme}" placeholder="Ex: Ingénieur">
                    </div>
                    <div class="form-group">
                        <label for="majeure">Majeure</label>
                        <input type="text" id="majeure" name="majeure" th:value="*{majeure}" placeholder="Ex: Informatique">
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>Entreprise et encadrement</h3>
                <div class="form-group">
                    <label for="entrepriseId">Entreprise <span class="required">*</span></label>
                    <select id="entrepriseId" name="entrepriseId" required>
                        <option value="">-- Sélectionner une entreprise --</option>
                        <option th:each="entreprise : ${entreprises}"
                                th:value="${entreprise.id}"
                                th:selected="${entreprise.id == apprenti.entreprise.id}"
                                th:text="${entreprise.raisonSociale}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="maitreApprentissageId">Maître d'apprentissage <span class="required">*</span></label>
                    <select id="maitreApprentissageId" name="maitreApprentissageId" required>
                        <option value="">-- Sélectionner un maître d'apprentissage --</option>
                        <option th:each="maitre : ${maitres}"
                                th:value="${maitre.id}"
                                th:selected="${maitre.id == apprenti.maitreApprentissage.id}"
                                th:text="${maitre.prenom + ' ' + maitre.nom + ' (' + maitre.entreprise.raisonSociale + ')'}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tuteurEnseignantId">Tuteur enseignant <span class="required">*</span></label>
                    <select id="tuteurEnseignantId" name="tuteurEnseignantId" required>
                        <option value="">-- Sélectionner un tuteur enseignant --</option>
                        <option th:each="tuteur : ${tuteurs}"
                                th:value="${tuteur.id}"
                                th:selected="${tuteur.id == apprenti.tuteurEnseignant.id}"
                                th:text="${tuteur.prenom + ' ' + tuteur.nom}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="section">
                <h3>Mission et objectifs</h3>
                <div class="form-group">
                    <label for="missionMotsCles">Mots-clés de la mission</label>
                    <textarea id="missionMotsCles" name="missionMotsCles" rows="3" placeholder="Ex: Développement web, Java, Spring Boot" th:text="*{missionMotsCles}"></textarea>
                </div>

                <div class="form-group">
                    <label for="missionMetierCible">Métier cible</label>
                    <input type="text" id="missionMetierCible" name="missionMetierCible" th:value="*{missionMetierCible}" placeholder="Ex: Développeur Full Stack">
                </div>

                <div class="form-group">
                    <label for="missionCommentaires">Commentaires sur la mission</label>
                    <textarea id="missionCommentaires" name="missionCommentaires" rows="4" placeholder="Description de la mission..." th:text="*{missionCommentaires}"></textarea>
                </div>
            </div>

            <div class="section">
                <h3>Remarques et feedback</h3>
                <div class="form-group">
                    <label for="feedbackTuteur">Feedback du tuteur</label>
                    <textarea id="feedbackTuteur" name="feedbackTuteur" rows="4" placeholder="Commentaires du tuteur enseignant..." th:text="*{feedbackTuteur}"></textarea>
                </div>

                <div class="form-group">
                    <label for="remarquesGenerales">Remarques générales</label>
                    <textarea id="remarquesGenerales" name="remarquesGenerales" rows="4" placeholder="Remarques générales..." th:text="*{remarquesGenerales}"></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Enregistrer les modifications</button>
                <a th:href="@{/dashboard}" class="btn-cancel">Annuler</a>
            </div>
        </form>
    </div>
</body>
</html>
