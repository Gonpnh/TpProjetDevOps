<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des entreprises - ASTA</title>
    <link rel="stylesheet" th:href="@{/css/create-entreprise.css}">
</head>
<body>
    <div class="header">
        <h1>ASTA Dashboard</h1>
        <div class="user-info">
            <a th:href="@{/dashboard}" class="back-btn">← Retour au tableau de bord</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <div class="header-content">
                <h2>Liste des entreprises</h2>
                <a th:href="@{/entreprises/create}" class="btn-add">+ Ajouter une entreprise</a>
            </div>
        </div>

        <div th:if="${success}" class="alert-success" style="background-color: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #66bb6a;">
            <span th:text="${success}"></span>
        </div>

        <div th:if="${entreprises.isEmpty()}" class="alert-empty">
            Aucune entreprise enregistrée. Ajoutez-en une pour commencer.
        </div>

        <div th:if="${!entreprises.isEmpty()}" class="table-container">
            <table class="apprentis-table">
                <thead>
                    <tr>
                        <th>Raison sociale</th>
                        <th>Adresse</th>
                        <th>Informations d'accès</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entreprise : ${entreprises}">
                        <td th:text="${entreprise.raisonSociale}">Entreprise ABC</td>
                        <td th:text="${entreprise.adresse ?: 'Non renseignée'}">123 rue exemple</td>
                        <td th:text="${entreprise.informationsAcces ?: 'Non renseignées'}">Badge requis</td>
                        <td>
                            <form th:action="@{/entreprises/{id}/delete(id=${entreprise.id})}" method="post" style="display: inline;">
                                <button type="submit" class="btn-delete" onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette entreprise ?');">
                                    Supprimer
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
